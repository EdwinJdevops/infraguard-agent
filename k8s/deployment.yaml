apiVersion: apps/v1
kind: Deployment
metadata:
  name: infraguard-agent
  namespace: infraguard
  labels:
    app: infraguard-agent
    version: "1.0.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: infraguard-agent
  template:
    metadata:
      labels:
        app: infraguard-agent
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: infraguard-agent
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: infraguard-agent
        image: ghcr.io/edwinJdevops/infraguard-agent:latest
        ports:
        - containerPort: 8000
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        env:
        - name: DEPLOYMENT_NAME
          value: "Phi-4-reasoning"
        - name: GITHUB_REPO
          value: "EdwinJdevops/infraguard-agent"
        # No static credentials — uses Azure Workload Identity OIDC
        - name: AZURE_ENDPOINT
          valueFrom:
            secretKeyRef:
              name: infraguard-secrets
              key: azure-endpoint
        - name: INFRAGUARD_API_KEY
          valueFrom:
            secretKeyRef:
              name: infraguard-secrets
              key: api-key
        - name: GITHUB_TOKEN
          valueFrom:
            secretKeyRef:
              name: infraguard-secrets
              key: github-token
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: infraguard-service
  namespace: infraguard
spec:
  selector:
    app: infraguard-agent
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8000
  type: ClusterIP
