apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: infraguard-network-policy
  namespace: infraguard
spec:
  podSelector:
    matchLabels:
      app: infraguard-agent
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    ports:
    - protocol: TCP
      port: 8000
  egress:
  - to: []
    ports:
    - protocol: TCP
      port: 443
    - protocol: TCP
      port: 80
