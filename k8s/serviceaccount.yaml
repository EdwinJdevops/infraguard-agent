apiVersion: v1
kind: ServiceAccount
metadata:
  name: infraguard-agent
  namespace: infraguard
  annotations:
    azure.workload.identity/client-id: ${AZURE_CLIENT_ID}
    azure.workload.identity/tenant-id: ${AZURE_TENANT_ID}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: infraguard-role
  namespace: infraguard
rules:
- apiGroups: [""]
  resources: ["configmaps", "secrets"]
  verbs: ["get", "list"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: infraguard-rolebinding
  namespace: infraguard
subjects:
- kind: ServiceAccount
  name: infraguard-agent
  namespace: infraguard
roleRef:
  kind: Role
  apiGroup: rbac.authorization.k8s.io
  name: infraguard-role
